# Upstream apps (Docker network hostnames)
upstream seekapa_web {
  server web:80;
}

upstream seekapa_admin {
  server admin:80;
}

upstream seekapa_api {
  server api:4000;
}

# -----------------------------
# HTTP — ACME challenge + redirect to HTTPS
# -----------------------------
server {
  listen 80;
  server_name my.nitajfx.online account.nitajfx.online api.nitajfx.online;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# Default HTTP (direct IP) → trading web
server {
  listen 80 default_server;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /api/ {
    proxy_pass http://seekapa_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://seekapa_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# -----------------------------
# HTTPS — Trading client
# -----------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name my.nitajfx.online;

  ssl_certificate     /etc/letsencrypt/live/nitajfx/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/nitajfx/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://seekapa_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;
  }

  location / {
    proxy_pass http://seekapa_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

