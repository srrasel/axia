# Upstream apps (Docker network hostnames)
upstream seekapa_web {
  server web:80;
}

upstream seekapa_admin {
  server admin:80;
}

upstream seekapa_api {
  server api:4000;
}

# Trading client — my.nitajfx.online
server {
  listen 80;
  server_name my.nitajfx.online;

  client_max_body_size 20m;

  # Same-origin API proxy (optional if VITE_API_URL points here)
  location /api/ {
    proxy_pass http://seekapa_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location / {
    proxy_pass http://seekapa_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Admin CRM — account.nitajfx.online
server {
  listen 80;
  server_name account.nitajfx.online;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://seekapa_api;
    proxy_http_version 1.1;
