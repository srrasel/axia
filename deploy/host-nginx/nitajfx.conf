# Host Ubuntu nginx → Docker published ports
# Install:
#   sudo cp deploy/host-nginx/nitajfx.conf /etc/nginx/sites-available/nitajfx
#   sudo ln -sf /etc/nginx/sites-available/nitajfx /etc/nginx/sites-enabled/nitajfx
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requires Docker apps listening on:
#   127.0.0.1:3000  web
#   127.0.0.1:3001  admin
#   127.0.0.1:4000  api
#
# Use 127.0.0.1 (not localhost) to avoid IPv6 ::1 connection refused → 502.

upstream nitaj_web {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream nitaj_admin {
  server 127.0.0.1:3001;
  keepalive 32;
}

upstream nitaj_api {
  server 127.0.0.1:4000;
  keepalive 32;
}

# HTTP → HTTPS (+ ACME)
server {
  listen 80;
  listen [::]:80;
  server_name my.nitajfx.online account.nitajfx.online api.nitajfx.online;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# Trading
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name my.nitajfx.online;

  ssl_certificate     /etc/letsencrypt/live/my.nitajfx.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/my.nitajfx.online/privkey.pem;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://nitaj_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location / {
    proxy_pass http://nitaj_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Admin
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name account.nitajfx.online;

  ssl_certificate     /etc/letsencrypt/live/account.nitajfx.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/account.nitajfx.online/privkey.pem;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://nitaj_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location / {
    proxy_pass http://nitaj_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# API
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.nitajfx.online;

  ssl_certificate     /etc/letsencrypt/live/api.nitajfx.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.nitajfx.online/privkey.pem;

  client_max_body_size 20m;

